<header class="header-container w-100 py-2 px-3">
  <div class="header-content container-fluid px-0">
    <!-- Linha 1: título + sessão -->
    <div class="row align-items-center g-2">
      <div class="col-12 col-md-9 header-title-col">
        <div class="knowledge-base text-truncate">{{ titulo() }}</div>
      </div>

      <div class="col-12 col-md-3 header-session-col">
        <div class="header-session d-flex flex-wrap align-items-center justify-content-start justify-content-md-end gap-2 small text-muted">
          <span
            class="token-timer"
            [class.token-timer--danger]="'' | tokenExpiringSoon:60">
            sessão expira em: <strong>{{ '' | tokenTimeLeft }}</strong>
          </span>

          <button
            type="button"
            class="btn btn-primary btn-sm header-btn header-logout-btn"
            (click)="logout()">
            logout
          </button>
        </div>
      </div>
    </div>

    <!-- Linha 2: filtros + incluir -->
    <div class="row align-items-center g-2 mt-2">
      <app-filtro
        class="col-12 col-md-10 header-filter-col"
        (filtroSelecionado)="onFiltroSelecionado($event)">
      </app-filtro>

      <div class="col-12 col-md-2 d-grid d-md-flex justify-content-md-end">
        <button
          type="button"
          class="btn btn-primary btn-sm header-btn header-include-btn"
          (click)="abrirDialog($event)">
          Incluir
        </button>
      </div>
    </div>

    <!-- Linha extra (timesheet) -->
    @if (selectedItemCategory.toLowerCase() === 'timesheet') {
      <div class="row mt-2">
        <div class="col-12 small">
          <span class="text-muted">Total Horas:</span>
          <strong class="ms-1">{{ totalHoras() | horaFormatada }}</strong>
        </div>
      </div>
    }
  </div>
</header>
